name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build
        run: cargo build --all-targets
      - name: Run unit tests
        run: cargo test --lib
      - name: Run integration tests
        run: cargo test --test integration_all_tools -- --test-threads=1
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb

  tool-count:
    name: Tool Count Assertion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Verify tools.json count matches dispatch arms
        run: |
          TOOLS_COUNT=$(jq 'length' tools.json)
          echo "tools.json count: $TOOLS_COUNT"
          # Count dispatch arms in server.rs (tools handled by match)
          DISPATCH_COUNT=$(grep -c '=> actions::' src/server.rs)
          echo "Dispatch arms: $DISPATCH_COUNT"
          if [ "$TOOLS_COUNT" -ne "$DISPATCH_COUNT" ]; then
            echo "FAIL: tools.json ($TOOLS_COUNT) != dispatch arms ($DISPATCH_COUNT)"
            exit 1
          fi
          echo "✓ Counts match at $TOOLS_COUNT"
